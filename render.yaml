services:
  - type: web
    name: madoyo-backend
    runtime: python
    buildCommand: ./render-build.sh
    startCommand: gunicorn api.main:app -w 1 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 600
    rootDir: .
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: PAYAPP_USERID
        sync: false
      - key: PAYAPP_LINKKEY
        sync: false
      - key: PAYAPP_LINKVAL
        sync: false
      - key: USE_CELERY
        value: "false"
      - key: MEDIA_BASE_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PAYAPP_WEBHOOK_URL
        sync: false
      - key: REWARD_COUNTDOWN_SEC
        value: "86400"
      - key: MEDIA_MAX_SIZE_MB
        value: "10"
